<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hekayələr</title>

<style>
body {
  margin:0;
  font-family: Arial;
  color:white;
  background:
    linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.85)),
    url('background.jpg') center/cover no-repeat fixed;
}

.header {
  padding:20px 40px;
  background:rgba(0,0,0,0.5);
}

.cards {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(280px,1fr));
  gap:20px;
  padding:40px;
}

.card {
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:15px;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
}

.card a {
  display:block;
  margin-top:10px;
  color:white;
}
</style>
</head>

<body>

<div class="header">
  <h2>Hekayələr</h2>
</div>

<div class="cards">

<div class="card">
  <h3>Təhsil hüququnun təmin edilməsi</h3>
  <p>Bu hekayədə təhsil hüququnun müdafiəsi ilə bağlı məsələ izah olunur.</p>
  <a href="story-1.html">Ətraflı bax →</a>
</div>

</div>

</body>
</html>
